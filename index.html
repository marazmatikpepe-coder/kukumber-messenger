<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kukumber - Мессенджер</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Экран загрузки -->
    <div id="loading-screen" class="loading-screen">
        <div class="logo-container">
            <div class="cucumber-logo">🥒</div>
            <h1>Kukumber</h1>
            <div class="loading-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <!-- Экран авторизации -->
    <div id="auth-screen" class="auth-screen hidden">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="cucumber-icon">🥒</div>
                <h1>Kukumber</h1>
                <p class="tagline">Свежее общение каждый день</p>
            </div>

            <!-- Форма входа -->
            <div id="login-form" class="auth-form">
                <h2>Вход</h2>
                <input type="text" id="login-username" placeholder="Email или номер телефона" required>
                <input type="password" id="login-password" placeholder="Пароль" required>
                <button onclick="login()" class="btn-primary">Войти</button>
                <p class="switch-form">Нет аккаунта? <a onclick="showRegister()">Зарегистрироваться</a></p>
            </div>

            <!-- Форма регистрации -->
            <div id="register-form" class="auth-form hidden">
                <h2>Регистрация</h2>
                <input type="text" id="reg-username" placeholder="Имя пользователя" required>
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="tel" id="reg-phone" placeholder="Номер телефона (необязательно)">
                <input type="password" id="reg-password" placeholder="Пароль" required>
                <input type="password" id="reg-password-confirm" placeholder="Подтвердите пароль" required>
                <button onclick="register()" class="btn-primary">Создать аккаунт</button>
                <p class="switch-form">Уже есть аккаунт? <a onclick="showLogin()">Войти</a></p>
            </div>
        </div>
    </div>

    <!-- Главный экран мессенджера -->
    <div id="main-screen" class="main-screen hidden">
        <div class="messenger-container">
            <!-- Боковая панель -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="user-info">
                        <div class="avatar" id="user-avatar">🥒</div>
                        <div class="user-details">
                            <h3 id="current-username">User</h3>
                            <span class="status online">В сети</span>
                        </div>
                    </div>
                    <button onclick="logout()" class="btn-logout" title="Выйти">🚪</button>
                </div>

                <div class="search-bar">
                    <input type="text" id="search-chats" placeholder="🔍 Поиск чатов..." oninput="searchChats()">
                </div>

                <div class="new-chat-btn">
                    <button onclick="showNewChatDialog()" class="btn-new-chat">+ Новый чат</button>
                </div>

                <div class="chats-list" id="chats-list">
                    <!-- Список чатов будет загружаться динамически -->
                </div>
            </aside>

            <!-- Область чата -->
            <main class="chat-area">
                <div id="no-chat-selected" class="no-chat">
                    <div class="cucumber-large">🥒</div>
                    <h2>Выберите чат</h2>
                    <p>Начните общение с друзьями</p>
                </div>

                <div id="active-chat" class="active-chat hidden">
                    <!-- Шапка чата -->
                    <div class="chat-header">
                        <div class="chat-user-info">
                            <div class="avatar">👤</div>
                            <div>
                                <h3 id="chat-username">User</h3>
                                <span class="chat-status" id="chat-status">в сети</span>
                            </div>
                        </div>
                        <div class="chat-actions">
                            <button onclick="startVoiceCall()" class="btn-icon" title="Аудиозвонок">📞</button>
                            <button onclick="startVideoCall()" class="btn-icon" title="Видеозвонок">📹</button>
                            <button onclick="toggleChatInfo()" class="btn-icon" title="Информация">ℹ️</button>
                        </div>
                    </div>

                    <!-- Сообщения -->
                    <div class="messages-container" id="messages-container">
                        <!-- Сообщения будут загружаться динамически -->
                    </div>

                    <!-- Поле ввода -->
                    <div class="message-input-area">
                        <button class="btn-icon" title="Прикрепить файл">📎</button>
                        <input type="text" id="message-input" placeholder="Введите сообщение..." onkeypress="handleMessageKeyPress(event)">
                        <button class="btn-icon" title="Эмодзи">😊</button>
                        <button onclick="sendMessage()" class="btn-send">Отправить</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Модальное окно видеозвонка -->
    <div id="call-modal" class="modal hidden">
        <div class="call-container">
            <div class="call-header">
                <h3 id="call-username">Звонок...</h3>
                <span id="call-status">Соединение...</span>
            </div>
            <div class="video-container">
                <video id="remote-video" autoplay playsinline></video>
                <video id="local-video" autoplay playsinline muted></video>
            </div>
            <div class="call-controls">
                <button onclick="toggleMute()" class="btn-call" id="mute-btn">🎤</button>
                <button onclick="toggleVideo()" class="btn-call" id="video-btn">📹</button>
                <button onclick="endCall()" class="btn-call btn-end-call">📵</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно нового чата -->
    <div id="new-chat-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Новый чат</h3>
                <button onclick="closeNewChatDialog()" class="btn-close">✕</button>
            </div>
            <input type="text" id="new-chat-search" placeholder="Введите имя пользователя..." oninput="searchUsers()">
            <div id="users-list" class="users-list">
                <!-- Список пользователей -->
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <!-- PeerJS для видеозвонков -->
    <script src="https://unpkg.com/peerjs@1.5.0/dist/peerjs.min.js"></script>

    <!-- Наши скрипты -->
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/calls.js"></script>
</body>
</html>
